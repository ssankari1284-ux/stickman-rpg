<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>棒人間RPG</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-color: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <!-- Phaser.js（ゲームエンジン）をインターネットから読み込む -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
  <!-- 各画面のプログラム -->
  <script src="js/scenes/TitleScene.js"></script>
  <script src="js/scenes/MapScene.js"></script>
  <script src="js/scenes/BattleScene.js"></script>
  <script src="js/scenes/MenuScene.js"></script>
  <script src="js/scenes/ShopScene.js"></script>
  <script src="js/scenes/ParamScene.js"></script>
  <!-- ゲーム本体の設定 -->
  <script src="js/game.js"></script>
</body>
</html>
